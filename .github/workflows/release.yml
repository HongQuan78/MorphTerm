name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  attestations: write
  id-token: write

jobs:
  windows-portable:
    name: Signed Windows portable
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build signed Windows portable
        run: npm run dist:win:release
        env:
          CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}

      - name: Upload signed Windows portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: morphterm-windows-portable-signed
          path: release/MorphTerm-*.exe
          if-no-files-found: error

      - name: Attest signed Windows portable provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release/MorphTerm-*.exe
