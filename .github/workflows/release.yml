name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  windows-portable:
    name: Windows release packages
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Check Windows signing secrets
        id: signing
        shell: pwsh
        env:
          WINDOWS_CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          WINDOWS_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
        run: |
          if ($env:WINDOWS_CSC_LINK -and $env:WINDOWS_CSC_KEY_PASSWORD) {
            "available=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          } else {
            "available=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            Write-Warning "Skipping signed portable build because Windows code-signing secrets are not configured."
          }

      - name: Build signed Windows portable
        if: steps.signing.outputs.available == 'true'
        run: npm run dist:win:release
        env:
          CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}

      - name: Generate Windows portable checksum
        if: steps.signing.outputs.available == 'true'
        shell: pwsh
        run: |
          Get-FileHash -Algorithm SHA256 release/MorphTerm-*.exe |
            ForEach-Object {
              "{0}  {1}" -f $_.Hash.ToLowerInvariant(), (Split-Path $_.Path -Leaf)
            } |
            Set-Content -Path release/MorphTerm-windows-portable.sha256 -Encoding ascii

      - name: Build Microsoft Store package
        run: npm run dist:win:store

      - name: Generate Microsoft Store package checksum
        shell: pwsh
        run: |
          Get-FileHash -Algorithm SHA256 release/MorphTerm-*.appx |
            ForEach-Object {
              "{0}  {1}" -f $_.Hash.ToLowerInvariant(), (Split-Path $_.Path -Leaf)
            } |
            Set-Content -Path release/MorphTerm-windows-store.sha256 -Encoding ascii

      - name: Upload signed Windows portable artifact
        if: steps.signing.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: morphterm-windows-portable-signed
          path: |
            release/MorphTerm-*.exe
            release/MorphTerm-windows-portable.sha256
          if-no-files-found: error

      - name: Upload Microsoft Store package artifact
        uses: actions/upload-artifact@v4
        with:
          name: morphterm-windows-store-appx
          path: |
            release/MorphTerm-*.appx
            release/MorphTerm-windows-store.sha256
          if-no-files-found: error

      - name: Attest signed Windows portable provenance
        if: steps.signing.outputs.available == 'true'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release/MorphTerm-*.exe

      - name: Attest Microsoft Store package provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release/MorphTerm-*.appx

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $portable = Get-ChildItem -Path release -Filter "MorphTerm-*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          $storePackage = Get-ChildItem -Path release -Filter "MorphTerm-*.appx" | Select-Object -First 1

          if (-not $storePackage) {
            throw "No MorphTerm Microsoft Store package found in release/."
          }

          $assets = @(
            $storePackage.FullName
            "release/MorphTerm-windows-store.sha256"
          )

          if ($portable) {
            $assets += $portable.FullName
            $assets += "release/MorphTerm-windows-portable.sha256"
          }

          $releaseArgs = @(
            "release"
            "create"
            "${{ github.ref_name }}"
          ) + $assets + @(
            "--title"
            "${{ github.ref_name }}"
            "--generate-notes"
            "--verify-tag"
          )

          gh @releaseArgs
