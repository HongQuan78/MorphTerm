name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  windows-portable:
    name: Signed Windows portable
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build signed Windows portable
        run: npm run dist:win:release
        env:
          CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}

      - name: Generate Windows portable checksum
        shell: pwsh
        run: |
          Get-FileHash -Algorithm SHA256 release/MorphTerm-*.exe |
            ForEach-Object {
              "{0}  {1}" -f $_.Hash.ToLowerInvariant(), (Split-Path $_.Path -Leaf)
            } |
            Set-Content -Path release/MorphTerm-windows-portable.sha256 -Encoding ascii

      - name: Upload signed Windows portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: morphterm-windows-portable-signed
          path: |
            release/MorphTerm-*.exe
            release/MorphTerm-windows-portable.sha256
          if-no-files-found: error

      - name: Attest signed Windows portable provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release/MorphTerm-*.exe

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $portable = Get-ChildItem -Path release -Filter "MorphTerm-*.exe" | Select-Object -First 1

          if (-not $portable) {
            throw "No MorphTerm portable executable found in release/."
          }

          gh release create "${{ github.ref_name }}" `
            $portable.FullName `
            release/MorphTerm-windows-portable.sha256 `
            --title "${{ github.ref_name }}" `
            --generate-notes `
            --verify-tag
